    const Navbar = () => {
      const [isVisible, setIsVisible] = useState(true);
      const [activeSection, setActiveSection] = useState('hero');
      const lastScrollY = useRef(0);

      useEffect(() => {
        const handleScroll = () => {
          const currentScrollY = window.scrollY;
          setIsVisible(currentScrollY < lastScrollY.current || currentScrollY < 50);
          lastScrollY.current = currentScrollY;

          // Update active section
          const sections = ['hero', 'experience', 'projects', 'about', 'contact'];
          for (const section of sections) {
            const element = document.getElementById(section);
            if (element) {
              const rect = element.getBoundingClientRect();
              if (rect.top <= 100 && rect.bottom >= 100) {
                setActiveSection(section);
                break;
              }
            }
          }
        };

        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const scrollToSection = (id) => {
        const element = document.getElementById(id);
        if (element) element.scrollIntoView({ behavior: 'smooth' });

                      >
                        <div className="w-12 h-12 glass rounded-full flex items-center justify-center">
                          <span className="text-xl">💼</span>
                        </div>
                        <div>
                          <div className="text-sm text-gray-500">LinkedIn</div>
                          <div>Conectar</div>
                        </div>
                      </a>
                      <a
                        href="https://github.com/Antomate22"
                        target="_blank"
                        className="flex items-center gap-4 text-gray-400 hover:text-gold transition-colors"
                      >
                        <div className="w-12 h-12 glass rounded-full flex items-center justify-center">
                          <span className="text-xl">🐙</span>
                        </div>
                        <div>
                          <div className="text-sm text-gray-500">GitHub</div>
                          <div>Ver repositorios</div>
                        </div>
                      </a>
                    </div>
                  </div>

                  <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                      <input
                        type="text"
                        placeholder="Tu nombre"
                        value={formData.name}
                        onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                        required
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-gold/50 transition-colors"
                      />
                    </div>
                    <div>
                      <input
                        type="email"
                        placeholder="Tu email"
                        value={formData.email}
                        onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                        required
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-gold/50 transition-colors"
                      />
                    </div>
                    <div>
                      <textarea
                        placeholder="Tu mensaje"
                        rows={4}
                        value={formData.message}
                        onChange={(e) => setFormData({ ...formData, message: e.target.value })}
                        required
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-gold/50 transition-colors resize-none"
                      />
                    </div>
                    <AnimatePresence>
                      {isSubmitted ? (
                        <motion.div
                          initial={{ opacity: 0, y: 10 }}
                          animate={{ opacity: 1, y: 0 }}
                          exit={{ opacity: 0, y: -10 }}
                          className="w-full py-3 rounded-xl text-center text-gold font-medium glass-strong"
                        >
                          ✓ Abriendo cliente de correo...
                        </motion.div>
                      ) : (
                        <motion.button
                          initial={{ opacity: 1 }}
                          exit={{ opacity: 0 }}
                          type="submit"
                          className="w-full glass-strong py-3 rounded-xl font-medium hover:bg-white/10 transition-all duration-300 glow-gold"
                        >
                          Enviar mensaje
                        </motion.button>
                      )}
                    </AnimatePresence>
                  </form>
                </div>
              </motion.div>
            </div>
          </div>
        </section>
      );
    };

    // Footer
    const Footer = () => {
      return (
        <footer className="py-8 border-t border-white/5">
          <div className="container mx-auto px-6 text-center text-gray-500">
            <p>Rocío Antonella Blasco · Full Stack Developer · Argentina · 2026</p>
          </div>
        </footer>
      );
    };

    // Main App
    const App = () => {
      return (
        <div className="min-h-screen bg-bg">
          <Navbar />
          <Hero />
          <Experience />
          <Projects />
          <About />
          <Contact />
          <Footer />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
